user nginx;
worker_processes auto;
pcre_jit on;
pid /tmp/nginx.pid;
error_log /dev/stdout info;
worker_rlimit_nofile 100000;

events {
    worker_connections 4000;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
    # cache informations about FDs, frequently accessed files
    # can boost performance, but you need to test those values
    open_file_cache max=20000 inactive=12h;
    open_file_cache_valid 30m;
    open_file_cache_errors on;

    # copies data between one FD and other from within the kernel
    # faster than read() + write()
    sendfile on;
    # send headers in one piece, it is better than sending them one by one
    tcp_nopush on;
    # don't buffer data sent, good for small data bursts in real time
    tcp_nodelay on;
    # allow the server to close connection on non responding client, this will free up memory
    reset_timedout_connection on;
    # request timed out -- default 60
    client_body_timeout 10;
    # if client stop responding, free up memory -- default 60
    send_timeout 10;
    # server will close connection after this time -- default 75
    keepalive_timeout 30;
    # number of requests client can make over keep-alive -- for testing environment
    keepalive_requests 100000;
    client_max_body_size 1m;
    server_tokens  off;

    # reduce the data that needs to be sent over network -- for testing environment
    # Three encodings offered; nginx picks per client Accept-Encoding
    # (zstd/brotli for modern browsers, gzip fallback for the rest). All
    # compress on the fly -- cheap here (low traffic, responses are cached).
    zstd on;
    zstd_comp_level 9;
    zstd_min_length 1000;
    zstd_types
        text/css
        text/javascript
        text/xml
        text/plain
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 1000;
    brotli_types
        text/css
        text/javascript
        text/xml
        text/plain
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;
    gzip on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_disable msie6;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        # text/html is always compressed by HttpGzipModule
        text/css
        text/javascript
        text/xml
        text/plain
        text/x-component
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    server {
        server_name xfenix.ru;
        # TCP (HTTP/1.1 + HTTP/2)
        listen [::]:443 ssl ipv6only=on;
        listen 443 ssl;
        # UDP (HTTP/3 / QUIC)
        listen [::]:443 quic;
        listen 443 quic reuseport;
        http2 on;
        http3 on;
        quic_gso on;
        quic_retry on;
        # Alt-Svc advertises HTTP/3 to clients. It MUST live in each serving
        # location below: every location here sets its own add_header, which
        # (per nginx rules) drops server-level add_header inheritance, so a
        # single server-level Alt-Svc would never be sent.
        ssl_certificate /etc/letsencrypt/live/xfenix.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/xfenix.ru/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
        # Fingerprinted assets (rev-hashed css/js/svg) and versioned vendor
        # fonts/icons never change under a given URL -> cache hard for a year.
        # html/json/xml/txt fall through to `location /` (30d) so content
        # updates are picked up.
        location ~* \.(?:css|js|woff2|woff|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            root /srv/www;
            try_files $uri =404;
            # single Cache-Control (no `expires`, which would add a 2nd one)
            add_header Cache-Control "public, immutable, max-age=31536000";
            add_header Alt-Svc 'h3=":443"; ma=86400';
            access_log off;
            add_header Access-Control-Allow-Origin *;
        }

        location / {
            etag on;
            expires 30d;
            add_header Cache-Control public;
            add_header Alt-Svc 'h3=":443"; ma=86400';
            access_log off;
            add_header Access-Control-Allow-Origin *;
            root /srv/www;
            try_files $uri $uri/index.html =404;
            index index.html;
        }

        location ~* /(api|rpc)/.*$ {
            proxy_pass http://back:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            break;
        }

        location ^~ /presentations/ {
          alias /srv/presentations/;
          etag on;
          expires 1h;
          add_header Cache-Control public;
          add_header Alt-Svc 'h3=":443"; ma=86400';
          access_log off;
          add_header Access-Control-Allow-Origin *;
          index index.html;
          try_files $uri $uri/ =404;
        }

        location = /presentations {
            return 301 /presentations/;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name xfenix.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }
}
